name: vitalact
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  firebase_auth: ^5.2.0
  firebase_core: ^3.4.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter:
  uses-material-design: true

  assets:
    - assets/images/Background.png
    - assets/images/Ellipse.png
    - assets/images/Notpress.png
    - assets/images/press.png
    - assets/icons/home.png
    - assets/icons/setting.png
    - assets/icons/profile.png
    - assets/icons/practice.png
    - assets/spritesheet/wave.png

  fonts:
    - family: BalooBhai2
      fonts:
        - asset: assets/fonts/BalooBhai2-Semibold.ttf
          weight: 600
        - asset: assets/fonts/BalooBhai2-Regular.ttf
          weight: 400
        - asset: assets/fonts/BalooBhai2-Medium.ttf
          weight: 500
        - asset: assets/fonts/BalooBhai2-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/BalooBhai2-Bold.ttf
          weight: 700
